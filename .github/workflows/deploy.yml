name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/zunkireelabs/edgexcrm

jobs:
  checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx eslint --max-warnings 50

      - run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NODE_OPTIONS: --max-old-space-size=6144

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: checks
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:prod
            ${{ env.IMAGE }}:prod-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Detects whether THIS push added migration files (pure git, no DB access —
  # keeps PROD_DB_URL scoped to the gated apply job below). Its boolean output
  # decides whether the approval-gated `migrate` job runs at all, so code-only
  # deploys are never paused.
  migrate-check:
    name: Detect Pending Migrations
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          BEFORE="${{ github.event.before }}"
          # A stage→main promotion is a merge commit; if `before` is absent or
          # unfetched, fall back to the merge's first parent (main's prior tip).
          if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE=$(git rev-parse HEAD^1)
          fi
          # Only NUMBERED migration files (NNN_*.sql) count. A change to a non-
          # numbered file like _TEMPLATE.sql (docs/scaffolding) must NOT trip the
          # gate — that caused a spurious prod-DB approval pause on #145.
          if git diff --name-only "$BEFORE" HEAD -- supabase/migrations/ | grep -qE '/[0-9]{3}_[^/]*\.sql$'; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "Migration files detected in this push — apply job will require approval:"
            git diff --name-only "$BEFORE" HEAD -- supabase/migrations/ | grep -E '/[0-9]{3}_[^/]*\.sql$'
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "No migration files in this push — apply job will be skipped."
          fi

  # Applies pending migrations to the PROD DB BEFORE the container swaps. Runs
  # only when migrate-check found migration files, and is gated by the
  # `production-db` environment's required reviewers — a human must approve
  # before any schema change touches prod. Fail-closed: scripts/migrate-apply.sh
  # proves connectivity, then applies ledger-pending files in order, aborting on
  # any error (which blocks the deploy job below).
  migrate:
    name: Apply Pending Migrations
    runs-on: ubuntu-latest
    needs: [build-push, migrate-check]
    if: needs.migrate-check.outputs.has_migrations == 'true'
    environment: production-db
    steps:
      - uses: actions/checkout@v4
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply pending migrations
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
        run: scripts/migrate-apply.sh prod

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Waits on migrate: proceeds when it succeeded (migrations applied) OR was
    # skipped (no migrations in this push); never deploys when migrate failed,
    # so new code can't land on a half-migrated DB.
    needs: [build-push, migrate]
    if: >-
      always() &&
      needs.build-push.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,INNGEST_EVENT_KEY,INNGEST_SIGNING_KEY,OPENAI_API_KEY,LANGFUSE_PUBLIC_KEY,LANGFUSE_SECRET_KEY
          script: |
            set -e
            cd /home/zunkireelabs/devprojects/lead-gen-crm
            git pull origin main
            # Ops env (Inngest) — idempotent managed block.
            sed -i '/^# --- BEGIN OPS env (managed by GitHub Actions) ---$/,/^# --- END OPS env ---$/d' .env.local
            {
              echo "# --- BEGIN OPS env (managed by GitHub Actions) ---"
              echo "INNGEST_EVENT_KEY=$INNGEST_EVENT_KEY"
              echo "INNGEST_SIGNING_KEY=$INNGEST_SIGNING_KEY"
              echo "# --- END OPS env ---"
            } >> .env.local
            # AI env — idempotent managed block. Prod scope = READ-ONLY Orca +
            # outreach drafting (ADR-001 D5; outreach sheet
            # docs/ai-native-efforts/working/D5-SIGNOFF-OUTREACH.md, 2026-07-23).
            # Enables the assistant (AI_ASSISTANT_ENABLED) + KB ingestion/retrieval
            # (AI_INGESTION_ENABLED) + outreach drafting. Deliberately does NOT set
            # AI_WRITE_TOOLS_ENABLED — Phase 4 write tools stay DARK on prod (unmerged,
            # behind hard gates + decision queue). Still double-gated per feature: a
            # tenant also needs tenants.ai_enabled (mig 174) before any token is sent,
            # so only opted-in tenants (currently zunkireelabs-crm) are affected.
            # AI_PROVIDER is pinned (never inferred from which key exists) — it
            # determines which third party receives customer data, so changing it is a
            # disclosure event.
            sed -i '/^# --- BEGIN AI env (managed by GitHub Actions) ---$/,/^# --- END AI env ---$/d' .env.local
            {
              echo "# --- BEGIN AI env (managed by GitHub Actions) ---"
              echo "OPENAI_API_KEY=$OPENAI_API_KEY"
              echo "AI_PROVIDER=openai"
              echo "AI_ASSISTANT_ENABLED=true"
              echo "AI_INGESTION_ENABLED=true"
              echo "AI_OUTREACH_DRAFT_ENABLED=true"
              echo "LANGFUSE_PUBLIC_KEY=$LANGFUSE_PUBLIC_KEY"
              echo "LANGFUSE_SECRET_KEY=$LANGFUSE_SECRET_KEY"
              echo "LANGFUSE_BASE_URL=https://cloud.langfuse.com"
              echo "# --- END AI env ---"
            } >> .env.local
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "Waiting for container to be healthy..."
            sleep 10
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' leads-crm 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then echo "Container is healthy!"; exit 0; fi
              echo "Attempt $i/18: Status is $STATUS, waiting..."
              sleep 10
            done
            echo "Container did not become healthy within 3 minutes"
            docker logs leads-crm --tail 50
            exit 1

      - name: Verify Health
        run: |
          for i in $(seq 1 18); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://edgex.zunkireelabs.com/login) || HTTP_CODE=000
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/18: HTTP $HTTP_CODE (TLS cert may still be issuing), waiting..."
            sleep 10
          done
          echo "Health check failed after retries"
          exit 1
