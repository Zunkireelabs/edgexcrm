name: Deploy to Staging

on:
  push:
    branches: [stage]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/zunkireelabs/edgexcrm

jobs:
  checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint --max-warnings 50
      - run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: checks
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:stage
            ${{ env.IMAGE }}:stage-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Apply Pending Migrations
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply pending migrations
        env:
          STAGE_DB_URL: ${{ secrets.STAGE_DB_URL }}
        run: scripts/migrate-apply.sh stage

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-push, migrate]
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,OPENAI_API_KEY,INNGEST_EVENT_KEY,INNGEST_SIGNING_KEY,LANGFUSE_PUBLIC_KEY,LANGFUSE_SECRET_KEY
          script: |
            set -e
            cd /home/zunkireelabs/devprojects/lead-gen-crm-dev
            git pull origin stage
            # Render the AI env block from GitHub environment secrets (idempotent:
            # replaces the previous managed block, never touches the rest of the file).
            sed -i '/^# --- BEGIN AI env (managed by GitHub Actions) ---$/,/^# --- END AI env ---$/d' .env.local
            {
              echo "# --- BEGIN AI env (managed by GitHub Actions) ---"
              echo "OPENAI_API_KEY=$OPENAI_API_KEY"
              echo "AI_ASSISTANT_ENABLED=true"
              echo "AI_INGESTION_ENABLED=true"
              # Phase 4 write tools on stage. Still double-gated: a tenant also
              # needs tenants.ai_enabled (mig 174), and every write is
              # approval-gated in the UI before it runs. Prod stays off.
              echo "AI_WRITE_TOOLS_ENABLED=true"
              # Pinned explicitly rather than inferred from which API key exists —
              # this value determines which third party receives customer data, so
              # changing it is a privacy-disclosure event (ADR-001 D5).
              echo "AI_PROVIDER=openai"
              echo "INNGEST_EVENT_KEY=$INNGEST_EVENT_KEY"
              echo "INNGEST_SIGNING_KEY=$INNGEST_SIGNING_KEY"
              echo "LANGFUSE_PUBLIC_KEY=$LANGFUSE_PUBLIC_KEY"
              echo "LANGFUSE_SECRET_KEY=$LANGFUSE_SECRET_KEY"
              echo "LANGFUSE_BASE_URL=https://cloud.langfuse.com"
              echo "# --- END AI env ---"
            } >> .env.local
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "Waiting for container to be healthy..."
            sleep 10
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' leads-crm-dev 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then echo "Container is healthy!"; exit 0; fi
              echo "Attempt $i/18: Status is $STATUS, waiting..."
              sleep 10
            done
            echo "Container did not become healthy within 3 minutes"
            docker logs leads-crm-dev --tail 50
            exit 1

      - name: Verify Health
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dev-lead-crm.zunkireelabs.com/login || echo 000)
            if [ "$CODE" = "200" ]; then echo "Health OK (HTTP $CODE) on attempt $i"; exit 0; fi
            echo "Attempt $i/10: HTTP $CODE — waiting 15s..."; sleep 15
          done
          echo "Health check failed after retries"; exit 1
