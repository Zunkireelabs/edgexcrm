name: Deploy to Staging

on:
  push:
    branches: [stage]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx eslint --max-warnings 50

      - run: npx tsc --noEmit

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: checks
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/zunkireelabs/devprojects/lead-gen-crm-dev
            git pull origin stage
            docker compose up -d --build
            echo "Waiting for container to be healthy..."
            sleep 10
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' leads-crm-dev 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Container is healthy!"
                exit 0
              fi
              echo "Attempt $i/12: Status is $STATUS, waiting..."
              sleep 10
            done
            echo "Container did not become healthy within 2 minutes"
            docker logs leads-crm-dev --tail 50
            exit 1

      - name: Verify Health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dev-lead-crm.zunkireelabs.com/login)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging health check passed (HTTP $HTTP_CODE)"
          else
            echo "Staging health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
