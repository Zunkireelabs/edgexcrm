name: Rollback

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to rollback to"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: false
        type: string
        default: "Production issue"

jobs:
  rollback:
    name: Rollback to ${{ inputs.commit_sha }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          TARGET_SHA: ${{ inputs.commit_sha }}
          ROLLBACK_REASON: ${{ inputs.reason }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: GHCR_USER,GHCR_TOKEN,TARGET_SHA,ROLLBACK_REASON
          script: |
            set -e
            IMAGE=ghcr.io/zunkireelabs/edgexcrm
            echo "=============================================================="
            echo "ROLLBACK to $TARGET_SHA — reason: $ROLLBACK_REASON"
            echo "WARNING: this reverts CODE ONLY. The database is NOT rolled back."
            echo "If the bad deploy included a migration, resolve the DB story first."
            echo "After the incident, roll FORWARD to a real main commit (normal deploy)."
            echo "=============================================================="
            cd /home/zunkireelabs/devprojects/lead-gen-crm
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # deploy.yml tags every prod build :prod-<sha>. Roll back by pulling that
            # pre-built image — no on-box rebuild, no git checkout / detached HEAD.
            if ! docker manifest inspect "$IMAGE:prod-$TARGET_SHA" > /dev/null 2>&1; then
              echo "ERROR: image $IMAGE:prod-$TARGET_SHA not found in GHCR."
              echo "That SHA was not deployed to prod via deploy.yml, so there is no image to roll back to."
              exit 1
            fi
            docker pull "$IMAGE:prod-$TARGET_SHA"
            # Point the :prod tag (what docker-compose.prod.yml references) at it, then restart.
            docker tag "$IMAGE:prod-$TARGET_SHA" "$IMAGE:prod"
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "Waiting for container to be healthy..."
            sleep 10
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' leads-crm 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Rollback successful! Container is healthy."
                exit 0
              fi
              echo "Attempt $i/12: Status is $STATUS, waiting..."
              sleep 10
            done
            echo "Rollback failed — container did not become healthy"
            docker logs leads-crm --tail 50
            exit 1

      - name: Verify Health
        run: |
          for i in $(seq 1 18); do
            # `|| HTTP_CODE=000` keeps a curl failure from aborting the loop under `set -e`.
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://edgex.zunkireelabs.com/login) || HTTP_CODE=000
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Rollback verified (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/18: HTTP $HTTP_CODE, waiting..."
            sleep 10
          done
          echo "Health check failed after rollback"
          exit 1
