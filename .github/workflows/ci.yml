name: CI

on:
  pull_request:
    branches: [main, stage]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-guard:
    name: Migration Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Every new migration must self-record in the ledger
        run: |
          git fetch origin "${{ github.base_ref }}" --quiet
          BASE_REF="origin/${{ github.base_ref }}" bash scripts/check-migrations.sh

  promotion-guard:
    name: Promotion Source Guard
    runs-on: ubuntu-latest
    steps:
      - name: PRs to main may only come from stage or promote/*
        run: |
          if [ "${{ github.base_ref }}" != "main" ]; then
            echo "✓ base is '${{ github.base_ref }}', not main — nothing to enforce."
            exit 0
          fi
          HEAD="${{ github.head_ref }}"
          case "$HEAD" in
            stage|promote/*)
              echo "✓ main PR head '$HEAD' is an allowed promotion source." ;;
            *)
              echo "✗ PRs to main may only come from 'stage' or a 'promote/*' branch (got '$HEAD')."
              echo "  main is PRODUCTION. Merge feature branches to stage first, then promote"
              echo "  stage → main. Direct-to-main merges are how main/stage diverge (see the"
              echo "  #138 incident in docs/dev-collab/DEV-WORKFLOW-AND-DEPLOYMENT.md)."
              exit 1 ;;
          esac

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx eslint --max-warnings 50

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
