name: CI

on:
  pull_request:
    branches: [main, stage]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-guard:
    name: Migration Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Every new migration must self-record in the ledger
        run: |
          git fetch origin "${{ github.base_ref }}" --quiet
          BASE_REF="origin/${{ github.base_ref }}" bash scripts/check-migrations.sh

  destructive-script-guard:
    name: Destructive Script Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No workflow may invoke a destructive data script
        run: |
          # scrub-stage-pii.sh rewrites customer names/phones/emails in place and
          # is irreversible. It already refuses to target prod (no prod option +
          # URL marker abort), but "cannot be run automatically at all" is a
          # stronger guarantee than "refuses when asked". It is a human-run,
          # supervised tool — never a pipeline step.
          #
          # Deliberately greps the workflow directory only: the script is allowed
          # to exist, be reviewed and be documented; it just may never be wired
          # into automation.
          # --exclude=ci.yml so this guard doesn't match its own comments and
          # error message. ci.yml runs only on pull_request and holds no
          # database credentials, so it isn't a route to prod data anyway.
          if grep -rn "scrub-stage-pii" .github/workflows/ --exclude=ci.yml; then
            echo "::error::A workflow references the stage scrub script. It rewrites customer data irreversibly and must only ever be run by a human against local or stage. Remove the reference."
            exit 1
          fi
          echo "OK — no workflow invokes a destructive data script."

  promotion-guard:
    name: Promotion Source Guard
    runs-on: ubuntu-latest
    steps:
      - name: PRs to main may only come from stage or promote/*
        run: |
          if [ "${{ github.base_ref }}" != "main" ]; then
            echo "✓ base is '${{ github.base_ref }}', not main — nothing to enforce."
            exit 0
          fi
          HEAD="${{ github.head_ref }}"
          case "$HEAD" in
            stage|promote/*)
              echo "✓ main PR head '$HEAD' is an allowed promotion source." ;;
            *)
              echo "✗ PRs to main may only come from 'stage' or a 'promote/*' branch (got '$HEAD')."
              echo "  main is PRODUCTION. Merge feature branches to stage first, then promote"
              echo "  stage → main. Direct-to-main merges are how main/stage diverge (see the"
              echo "  #138 incident in docs/dev-collab/DEV-WORKFLOW-AND-DEPLOYMENT.md)."
              exit 1 ;;
          esac

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx eslint --max-warnings 50

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NODE_OPTIONS: --max-old-space-size=6144
