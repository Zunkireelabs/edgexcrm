name: Email Poll (prod)

on:
  schedule:
    # GitHub Actions scheduled workflows have a documented ~5-minute floor
    # (and can run later still under platform load) — a shorter interval
    # like the */2 the VPS cron this replaces used would just be silently
    # throttled to the same real cadence, so this is written honestly at
    # the floor rather than implying a freshness GH Actions can't deliver.
    - cron: '*/5 * * * *'
  workflow_dispatch:          # manual trigger for testing

concurrency:
  group: email-poll-prod
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST prod poll endpoint
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_CRON_SECRET_PROD }}" \
            -H "Content-Type: application/json" \
            https://edgex.zunkireelabs.com/api/internal/email/poll)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "Body: $body"
          [ "$http_code" = "200" ] || exit 1
